<html>
<head>
<title> Real Time Chat Application</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.1/stomp.min.js"></script>
<style>
button:hover {
    opacity: 0.9;
}
</style>
</head>

<body style="background:#f0f2f5;">

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">
    
    <div class="card shadow-lg" style="width:400px; border-radius:15px;">
        
        <!-- Header -->
        <div class="card-header text-white text-center" style="background:#0d6efd; border-radius:15px 15px 0 0;">
            <h5>💬 Real-Time Chat</h5>
        </div>

        <!-- Chat Area -->
        <div id="chat" class="p-3" style="height:350px; overflow-y:auto; background:#e5ddd5;">
        </div>

        <!-- Name Input -->
        <div class="p-2">
            <input id="senderInput" type="text" class="form-control" placeholder="Enter your name">
        </div>

        <!-- Message Input -->
        <div class="input-group p-2">
            <input id="messageInput" type="text" class="form-control" placeholder="Type a message">
            <button id="sendMessage" class="btn btn-success">Send</button>
        </div>

    </div>

</div>
</body>
<script>
function setConnected(connected){
	document.getElementById('sendMessage').disabled=!connected;
}
function connect(){
	var socket =new SockJS('/chat');
	stompClient = Stomp.over(socket);
	stompClient.connect({},function(frame){
		setConnected(true);
		stompClient.subscribe('/topic/messages',function(message){
			showMessage(JSON.parse(message.body));
		});
	});
}
function showMessage(message){
    var chat = document.getElementById('chat');
    var messageElement = document.createElement('div');

    var currentUser = document.getElementById('senderInput').value;

    // Message text
    messageElement.innerHTML = `
        <small style="font-weight:bold;">${message.sender}</small><br>
        ${message.content}
    `;

    // Common styles
    messageElement.style.padding = "8px 12px";
    messageElement.style.borderRadius = "10px";
    messageElement.style.marginBottom = "8px";
    messageElement.style.maxWidth = "75%";
    messageElement.style.boxShadow = "0 1px 2px rgba(0,0,0,0.2)";

    // Different UI for sender and receiver
    if(message.sender === currentUser){
        messageElement.style.background = "#dcf8c6"; // green
        messageElement.style.marginLeft = "auto";
    } else {
        messageElement.style.background = "#ffffff"; // white
        messageElement.style.marginRight = "auto";
    }

    chat.appendChild(messageElement);
    chat.scrollTop = chat.scrollHeight;
}
	function sendMessage(message){
		var sender = document.getElementById('senderInput').value;
		var  content = document.getElementById('messageInput').value;
		var chatMessage={
				sender : sender,
				content :content
		}
		stompClient.send("/app/sendMessage",{},JSON.stringify(chatMessage));
		document.getElementById('messageInput').value='';
	}
	document.getElementById('sendMessage').onclick=sendMessage;
	window.onload =connect;
	


</script>
</html>
